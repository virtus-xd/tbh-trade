name: price-ingest

# Düzenli fiyat toplama + fırsat taraması (Değişmez kural #1: Steam'e yalnız
# bu worker server-side gider). Tam kapsam — serverless süre limiti yok.
on:
  schedule:
    - cron: "0 */6 * * *" # her 6 saatte bir (UTC)
  workflow_dispatch: {} # Actions sekmesinden elle tetikleme

# Üst üste binen çalışmaları engelle (Steam rate-limit + DB tutarlılığı).
concurrency:
  group: price-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # Aşağıdakilerin hepsinin koddaki varsayılanları var; istersen repo
      # Secrets/Variables ile override edebilirsin.
      STEAM_APP_ID: ${{ vars.STEAM_APP_ID || '3678970' }}
      STEAM_CURRENCY: ${{ vars.STEAM_CURRENCY || '1' }}
      PRICE_PROVIDER: ${{ vars.PRICE_PROVIDER || 'steam_direct' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Ingest prices (full)
        run: pnpm ingest:once

      - name: Scan opportunities
        run: pnpm scan:once
